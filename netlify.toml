[build]
  publish = "."

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Fonctions v1 : redirections explicites requises ──────────────────
[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/quotes/batch"
  to = "/.netlify/functions/quotes-batch"
  status = 200

[[redirects]]
  from = "/api/options/atm"
  to = "/.netlify/functions/options-atm"
  status = 200

[[redirects]]
  from = "/api/ib/*"
  to = "/.netlify/functions/backend-proxy/:splat"
  status = 200

# ── Fonctions v2 : routées par export const config = { path } ────────
# (pas de redirection nécessaire — Netlify les enregistre automatiquement)

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache"
