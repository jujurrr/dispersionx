[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# ── API serverless (Phase 2) ── le frontend appelle /api/*, on redirige vers les functions.
# status = 200 → rewrite (conserve la méthode POST et le corps de la requête).
[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/quotes/batch"
  to = "/.netlify/functions/quotes-batch"
  status = 200

# /api/indices/:symbol/snapshot et /components sont routés directement par les
# fonctions via leur `export const config = { path }` (paramètre de chemin fiable).

[[redirects]]
  from = "/api/options/atm"
  to = "/.netlify/functions/options-atm"
  status = 200

# Phase 3 — proxy vers le backend IBKR (FastAPI sur VPS). Tout /api/ib/* est relayé.
[[redirects]]
  from = "/api/ib/*"
  to = "/.netlify/functions/backend-proxy/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache"
