<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces" subtitle="Graphite canvas → anthracite card stack" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);font-family:var(--font-sans);padding:18px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .sw{flex:1;min-width:92px;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
  .chip{height:48px;}
  .meta{padding:7px 9px;background:var(--bg-card);}
  .name{font:var(--type-label);text-transform:uppercase;letter-spacing:var(--track-label);color:var(--text-soft);}
  .hex{font:var(--type-data-sm);color:var(--text-muted);margin-top:2px;}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--bg-base)"></div><div class="meta"><div class="name">base</div><div class="hex">#0a0e14</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-surface)"></div><div class="meta"><div class="name">surface</div><div class="hex">#0d1117</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-elevated)"></div><div class="meta"><div class="name">elevated</div><div class="hex">#131722</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-card)"></div><div class="meta"><div class="name">card</div><div class="hex">#161b22</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-input)"></div><div class="meta"><div class="name">field</div><div class="hex">#1a1f2e</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--bg-hover)"></div><div class="meta"><div class="name">hover</div><div class="hex">#1c2230</div></div></div>
  </div>
</body></html>
