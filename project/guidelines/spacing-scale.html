<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);font-family:var(--font-sans);padding:22px;display:flex;align-items:flex-end;gap:16px;}
  .u{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{background:var(--accent-soft);border:1px solid var(--accent);border-radius:2px;}
  .v{font:var(--type-data-sm);color:var(--text-muted);}
</style></head>
<body>
  <div class="u"><div class="box" style="width:4px;height:4px"></div><div class="v">1·4</div></div>
  <div class="u"><div class="box" style="width:8px;height:8px"></div><div class="v">2·8</div></div>
  <div class="u"><div class="box" style="width:12px;height:12px"></div><div class="v">3·12</div></div>
  <div class="u"><div class="box" style="width:16px;height:16px"></div><div class="v">4·16</div></div>
  <div class="u"><div class="box" style="width:24px;height:24px"></div><div class="v">6·24</div></div>
  <div class="u"><div class="box" style="width:32px;height:32px"></div><div class="v">8·32</div></div>
  <div class="u"><div class="box" style="width:48px;height:48px"></div><div class="v">12·48</div></div>
  <div class="u"><div class="box" style="width:64px;height:64px"></div><div class="v">16·64</div></div>
</body></html>
