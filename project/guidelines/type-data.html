<!-- @dsCard group="Type" viewport="700x160" name="Data / Mono" subtitle="JetBrains Mono — every figure, ticker, greek" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);color:var(--text);font-family:var(--font-sans);padding:20px 22px;}
  .r{display:flex;align-items:baseline;gap:16px;margin-bottom:13px;}
  .lab{font:var(--type-data-sm);color:var(--text-dim);width:120px;}
  .xl{font:var(--type-data-xl);letter-spacing:-0.02em;}
  .lg{font:var(--type-data-lg);}
  .d{font:var(--type-data);}
  .tk{font:var(--type-ticker);}
  .pos{color:var(--pos-bright);}.neg{color:var(--neg-bright);}
</style></head>
<body>
  <div class="r"><span class="lab">data-xl · 32</span><span class="xl">+6.4<span style="font-size:18px;color:var(--text-muted)">pts</span></span></div>
  <div class="r"><span class="lab">data-lg · 20</span><span class="lg pos">18.2%</span><span class="lg neg">−2.10%</span></div>
  <div class="r"><span class="lab">data · 14</span><span class="d">ρ_impl 0.61 · ρ̂_réel 0.48 · θ −42</span></div>
  <div class="r"><span class="lab">ticker · 13</span><span class="tk">NVDA</span><span class="tk">AAPL</span><span class="tk">SPX</span></div>
</body></html>
