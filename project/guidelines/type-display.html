<!-- @dsCard group="Type" viewport="700x180" name="Display & Headings" subtitle="Inter, heavy, tight tracking" -->
<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-base);color:var(--text);font-family:var(--font-sans);padding:20px 22px;}
  .r{display:flex;align-items:baseline;gap:14px;margin-bottom:11px;}
  .lab{font:var(--type-data-sm);color:var(--text-dim);white-space:nowrap;width:120px;}
  .display{font:var(--type-display);letter-spacing:var(--track-tight);}
  .h1{font:var(--type-h1);letter-spacing:var(--track-snug);}
  .h2{font:var(--type-h2);letter-spacing:var(--track-snug);}
  .h3{font:var(--type-h3);}
</style></head>
<body>
  <div class="r"><span class="lab">display · 32/800</span><span class="display">Short correlation</span></div>
  <div class="r"><span class="lab">h1 · 24/800</span><span class="h1">Strategy Builder</span></div>
  <div class="r"><span class="lab">h2 · 20/700</span><span class="h2">Prime de corrélation</span></div>
  <div class="r"><span class="lab">h3 · 16/700</span><span class="h3">Composants du panier</span></div>
</body></html>
