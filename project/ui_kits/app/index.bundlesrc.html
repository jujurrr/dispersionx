<style>
  /* Standalone export safety: the bundler's splash-reveal can defer CSS
     entrance animations, leaving `.dx-rise` elements stuck at opacity:0.
     Force the visible end-state so hero metrics never render blank offline. */
  .dx-rise{animation:none !important;opacity:1 !important;transform:none !important;}
</style>
<script>
  /* Make count-up resolve to final values immediately offline (rAF can be
     suspended during unpack). Report reduced-motion to the count-up hook. */
  (function(){
    var _mm = window.matchMedia ? window.matchMedia.bind(window) : null;
    window.matchMedia = function(q){
      if(/prefers-reduced-motion/.test(q)){
        return {matches:true, media:q, onchange:null,
          addEventListener:function(){}, removeEventListener:function(){},
          addListener:function(){}, removeListener:function(){}, dispatchEvent:function(){return false;}};
      }
      return _mm ? _mm(q) : {matches:false, media:q, addEventListener:function(){}, removeEventListener:function(){}, addListener:function(){}, removeListener:function(){}};
    };
  })();
</script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg-base);font-family:var(--font-sans);color:var(--text);}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-track{background:var(--bg-base);}
  ::-webkit-scrollbar-thumb{background:var(--border);border:2px solid var(--bg-base);border-radius:5px;}
  ::selection{background:var(--accent);color:#fff;}
  table{font-variant-numeric:tabular-nums;}
</style>
